<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="google-site-verification" content="-9bjXWHEMcjyVl8Vijf3GjaOMCe4PetbdXj48HU_1iA" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick PDF Merger - Your Iconic PDF Tool</title>
    <!-- Font Awesome Icons (आइकॉन के लिए) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts (बेहतर टेक्स्ट स्टाइल के लिए) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- pdf-lib Library (PDF मर्ज करने के लिए) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        /* Modern & Minimalist Style */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* The Iconic Card Styling */
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid #e1e8ed;
        }

        /* Iconic Header Styling */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .header-icon {
            font-size: 3rem;
            color: #4a90e2; /* Modern Blue */
        }

        .header h1 {
            font-weight: 700;
            color: #333;
            margin: 0;
            font-size: 2.2rem;
        }

        .description {
            color: #777;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        /* Upload Area with Big Icon */
        .upload-area {
            border: 3px dashed #cbd5e1;
            background-color: #f1f5f9;
            border-radius: 15px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            margin-bottom: 25px;
        }

        .upload-area:hover {
            background-color: #e2e8f0;
            border-color: #a0aec0;
        }

        .upload-area input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 4rem;
            color: #4a90e2;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #4a90e2;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .upload-subtext {
            color: #777;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        /* File List Area with Icons */
        #fileList {
            text-align: left;
            margin-bottom: 25px;
            max-height: 150px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .file-item {
            background: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #555;
        }

        .file-icon {
            font-size: 1.2rem;
            color: #4a90e2;
        }

        /* Action Buttons with Icons */
        .merge-btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.2);
        }

        .merge-btn:hover {
            background-color: #357ab8;
        }

        .merge-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Status & Error Area */
        #status {
            margin-top: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
        }

        .status-icon {
            margin-right: 8px;
        }

    </style>
</head>
<body>

    <!-- Main Iconic Card -->
    <div class="card">
        <!-- Iconic Header -->
        <div class="header">
            <i class="fa-solid fa-file-pdf header-icon"></i>
            <h1>PDF Merger Tool</h1>
        </div>
        <p class="description">Iconic Design. Seamless Merging. Your PDF Solution.</p>

        <!-- Upload Area with Big Icon -->
        <div class="upload-area">
            <input type="file" id="pdfInput" multiple accept="application/pdf" onchange="handleFileSelect(event)">
            <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
            <span class="upload-text">Select Multiple PDFs</span>
            <span class="upload-subtext">(Click to upload)</span>
        </div>

        <!-- Selected Files List with Icons -->
        <div id="fileList"></div>

        <!-- Merge Button with Icon -->
        <button id="mergeBtn" class="merge-btn" onclick="mergePDFs()" disabled>
            <i class="fa-solid fa-file-export status-icon"></i>
            PDFs Merge करें
        </button>

        <!-- Status & Error with Icons -->
        <div id="status">
            <!-- Icon will be added dynamically by script -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
